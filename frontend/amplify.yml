version: 1

applications:
  - appRoot: frontend

    frontend:
      phases:
        preBuild:
          commands:
            - node -v
            - npm ci
        build:
          commands:
            - echo "Building Next.js app...."
            - npm run build
      artifacts:
        baseDirectory: .next/standalone
        files:
          - '**/*'
      cache:
        paths:
          - node_modules/**/*
          - .next/cache/**/*